<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c14;--card:#13131f;--card2:#18182a;--border:#1e1e32;
  --accent:#6366f1;--accent2:#a5b4fc;--text:#f0f0fa;--muted:#6b6b9a;--green:#10b981;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* HEADER */
header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(12,12,20,0.95);position:sticky;top:0;z-index:50;}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;font-family:'DM Sans',sans-serif;}

/* MAIN LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 61px);}

/* LEFT PANEL */
.left{background:var(--card);border-right:1px solid var(--border);padding:24px;overflow-y:auto;max-height:calc(100vh - 61px);}
.section-title{font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}

/* FORM */
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px;}
.field input,.field textarea,.field select{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:9px;font-size:0.88rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent2);}
.field textarea{resize:vertical;min-height:180px;line-height:1.6;}
.field select option{background:var(--card);}

/* THEME PICKER */
.themes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.theme-btn{border:2px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all 0.2s;background:var(--card2);}
.theme-btn:hover{border-color:var(--accent2);}
.theme-btn.active{border-color:var(--accent2);background:rgba(99,102,241,0.1);}
.theme-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 6px;}
.theme-name{font-size:0.68rem;color:var(--muted);font-weight:600;}

/* BUTTONS */
.btn{background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center;}
.btn:hover{background:#4f46e5;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);margin-bottom:10px;}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2);background:transparent;}
.btn-green{background:var(--green);}
.btn-green:hover{background:#059669;}

/* RIGHT PANEL — PREVIEW */
.right{background:#e8e8e8;overflow-y:auto;max-height:calc(100vh - 61px);padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px;}

/* PAGE PREVIEW */
.page-preview{background:white;width:100%;max-width:595px;box-shadow:0 4px 24px rgba(0,0,0,0.15);border-radius:4px;overflow:hidden;position:relative;}
.page-label{font-size:0.7rem;font-weight:700;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;width:100%;max-width:595px;}

/* DIVIDER */
hr{border:none;border-top:1px solid var(--border);margin:18px 0;}

/* MOBILE */
@media(max-width:700px){
  .layout{grid-template-columns:1fr;}
  .right{max-height:none;}
  .left{max-height:none;}
}

/* LOADER */
.loader{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">✦ PDF Designer</div>
    <div class="logo-sub">Professional ebook design tool</div>
  </div>
</header>

<div class="layout">

<!-- LEFT: CONTROLS -->
<div class="left">

  <div class="section-title">Book Details</div>
  <div class="field"><label>Ebook Title</label><input id="title" placeholder="e.g. 21-Day High-Protein Meal Plan" value="21-Day High-Protein Indian Meal Plan for Fat Loss"/></div>
  <div class="field"><label>Your Name / Brand</label><input id="author" placeholder="e.g. Vishal" value="Vishal"/></div>
  <div class="field"><label>Tagline</label><input id="tagline" placeholder="e.g. Your simple guide to a healthier life" value="Eat Indian food. Stay full. Lose fat sustainably."/></div>

  <hr/>
  <div class="section-title">Color Theme</div>
  <div class="themes">
    <div class="theme-btn active" onclick="setTheme('indigo',this)">
      <div class="theme-dot" style="background:linear-gradient(135deg,#6366f1,#4338ca)"></div>
      <div class="theme-name">Indigo</div>
    </div>
    <div class="theme-btn" onclick="setTheme('emerald',this)">
      <div class="theme-dot" style="background:linear-gradient(135deg,#10b981,#065f46)"></div>
      <div class="theme-name">Emerald</div>
    </div>
    <div class="theme-btn" onclick="setTheme('rose',this)">
      <div class="theme-dot" style="background:linear-gradient(135deg,#f43f5e,#9f1239)"></div>
      <div class="theme-name">Rose</div>
    </div>
    <div class="theme-btn" onclick="setTheme('amber',this)">
      <div class="theme-dot" style="background:linear-gradient(135deg,#f59e0b,#92400e)"></div>
      <div class="theme-name">Amber</div>
    </div>
    <div class="theme-btn" onclick="setTheme('slate',this)">
      <div class="theme-dot" style="background:linear-gradient(135deg,#334155,#0f172a)"></div>
      <div class="theme-name">Slate</div>
    </div>
    <div class="theme-btn" onclick="setTheme('violet',this)">
      <div class="theme-dot" style="background:linear-gradient(135deg,#8b5cf6,#5b21b6)"></div>
      <div class="theme-name">Violet</div>
    </div>
  </div>

  <hr/>
  <div class="section-title">Ebook Content</div>
  <div class="field">
    <label>Paste Your Ebook Content</label>
    <textarea id="content" placeholder="Paste your full ebook content here (from ChatGPT or Ebook Builder)...&#10;&#10;The tool will automatically:&#10;- Detect chapters&#10;- Style headings&#10;- Format bullet points&#10;- Create callout boxes"></textarea>
  </div>

  <button class="btn btn-ghost" onclick="previewAll()">👁 Preview All Pages</button>
  <button class="btn btn-green" onclick="downloadPDF()">⬇ Download Beautiful PDF</button>

</div>

<!-- RIGHT: PREVIEW -->
<div class="right" id="preview-area">
  <div style="text-align:center;color:#999;padding:60px 20px;">
    <div style="font-size:3rem;margin-bottom:16px">✦</div>
    <div style="font-size:1rem;font-weight:600;color:#555">Fill in details & tap Preview</div>
    <div style="font-size:0.85rem;margin-top:8px;color:#888">Your beautiful PDF pages will appear here</div>
  </div>
</div>

</div>

<script>
// THEMES
const themeMap = {
  indigo:{p:'#6366f1',d:'#4338ca',l:'#eef2ff',t:'#312e81',a:'#c7d2fe'},
  emerald:{p:'#10b981',d:'#065f46',l:'#ecfdf5',t:'#064e3b',a:'#a7f3d0'},
  rose:{p:'#f43f5e',d:'#9f1239',l:'#fff1f2',t:'#881337',a:'#fecdd3'},
  amber:{p:'#f59e0b',d:'#92400e',l:'#fffbeb',t:'#78350f',a:'#fde68a'},
  slate:{p:'#475569',d:'#0f172a',l:'#f1f5f9',t:'#0f172a',a:'#cbd5e1'},
  violet:{p:'#8b5cf6',d:'#5b21b6',l:'#f5f3ff',t:'#4c1d95',a:'#ddd6fe'}
};
let currentTheme = 'indigo';

function setTheme(name, el){
  currentTheme = name;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function getT(){ return themeMap[currentTheme]||themeMap.indigo; }

// PARSE CONTENT
function parseContent(raw){
  const lines = raw.split('\n');
  const blocks = [];
  lines.forEach(line=>{
    const l = line.trim();
    if(!l){ blocks.push({type:'space'}); return; }
    if(l.match(/^#{1,2}\s/) || l.match(/^(Chapter|Introduction|Conclusion|Preface)/i)){
      blocks.push({type:'chapter', text:l.replace(/^#+\s*/,'')});
    } else if(l.match(/^###\s/) || l.match(/^[A-Z][A-Za-z\s]{3,40}:$/)){
      blocks.push({type:'subheading', text:l.replace(/^#+\s*/,'').replace(/:$/,'')});
    } else if(l.startsWith('-')||l.match(/^\d+\.\s/)||l.startsWith('•')){
      blocks.push({type:'bullet', text:l.replace(/^[-•\d.]+\s*/,'')});
    } else if(l.startsWith('>')||l.startsWith('"')){
      blocks.push({type:'quote', text:l.replace(/^[>"]\s*/,'')});
    } else if(l.match(/^(Note:|Tip:|Important:|Remember:)/i)){
      blocks.push({type:'callout', text:l});
    } else {
      blocks.push({type:'text', text:l});
    }
  });
  return blocks;
}

// PREVIEW
function previewAll(){
  const title = document.getElementById('title').value||'My Ebook';
  const author = document.getElementById('author').value||'Author';
  const tagline = document.getElementById('tagline').value||'';
  const content = document.getElementById('content').value;
  const t = getT();
  const area = document.getElementById('preview-area');
  area.innerHTML = '';

  // COVER PAGE
  area.innerHTML += `<div class="page-label">Cover Page</div>`;
  area.innerHTML += renderCover(title, author, tagline, t);

  if(content.trim()){
    // TOC
    const blocks = parseContent(content);
    const chapters = blocks.filter(b=>b.type==='chapter').slice(0,8);
    if(chapters.length>0){
      area.innerHTML += `<div class="page-label" style="margin-top:16px">Table of Contents</div>`;
      area.innerHTML += renderTOC(chapters, t);
    }

    // FIRST CONTENT PAGE
    area.innerHTML += `<div class="page-label" style="margin-top:16px">Content Pages (Sample)</div>`;
    area.innerHTML += renderContentPage(blocks.slice(0,30), t, title);

    // BACK COVER
    area.innerHTML += `<div class="page-label" style="margin-top:16px">Back Cover</div>`;
    area.innerHTML += renderBackCover(title, author, tagline, t);
  }
}

function renderCover(title, author, tagline, t){
  return `
  <div class="page-preview" style="aspect-ratio:1/1.414;">
    <div style="background:linear-gradient(160deg,${t.p} 0%,${t.d} 100%);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;text-align:center;position:relative;overflow:hidden;">
      <!-- Decorative circles -->
      <div style="position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>
      <div style="position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>
      <!-- Top label -->
      <div style="font-family:'DM Sans',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:32px;">E B O O K</div>
      <!-- Divider top -->
      <div style="width:40px;height:2px;background:rgba(255,255,255,0.4);margin-bottom:28px;border-radius:2px;"></div>
      <!-- Title -->
      <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:white;line-height:1.2;margin-bottom:20px;letter-spacing:-0.5px;">${title}</h1>
      <!-- Tagline -->
      ${tagline?`<p style="font-family:'Lora',serif;font-size:0.85rem;font-style:italic;color:rgba(255,255,255,0.8);margin-bottom:28px;line-height:1.6;">${tagline}</p>`:''}
      <!-- Divider bottom -->
      <div style="width:40px;height:2px;background:rgba(255,255,255,0.4);margin-bottom:24px;border-radius:2px;"></div>
      <!-- Author -->
      <div style="font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.9);letter-spacing:1px;">By ${author}</div>
    </div>
  </div>`;
}

function renderTOC(chapters, t){
  const items = chapters.map((ch,i)=>`
    <div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px dashed #e5e7eb;">
      <div style="width:28px;height:28px;border-radius:6px;background:${t.l};display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:700;color:${t.p};flex-shrink:0;margin-right:14px;">${i+1}</div>
      <div style="flex:1;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:#333;font-weight:500;">${ch.text}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:#999;">${(i+1)*3+1}</div>
    </div>
  `).join('');

  return `
  <div class="page-preview">
    <!-- Header bar -->
    <div style="background:${t.p};height:6px;"></div>
    <div style="padding:40px 44px;">
      <div style="font-family:'DM Sans',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:3px;color:${t.p};text-transform:uppercase;margin-bottom:8px;">Contents</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#111;margin-bottom:28px;letter-spacing:-0.5px;">Table of Contents</h2>
      ${items}
    </div>
    <!-- Footer -->
    <div style="background:${t.l};padding:12px 44px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:0.65rem;color:${t.t};font-family:'DM Sans',sans-serif;font-weight:600;opacity:0.7;">CONTENTS</span>
      <div style="width:20px;height:2px;background:${t.p};border-radius:2px;"></div>
    </div>
  </div>`;
}

function renderContentPage(blocks, t, title){
  let html = '';
  blocks.forEach(b=>{
    if(b.type==='space') html+=`<div style="height:6px"></div>`;
    else if(b.type==='chapter'){
      html+=`
      <div style="margin:20px 0 16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="width:4px;height:28px;background:${t.p};border-radius:2px;flex-shrink:0;"></div>
          <h2 style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:${t.t};line-height:1.3;">${b.text}</h2>
        </div>
        <div style="height:1px;background:${t.a};margin-left:14px;"></div>
      </div>`;
    } else if(b.type==='subheading'){
      html+=`<h3 style="font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;color:${t.p};margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.5px;">${b.text}</h3>`;
    } else if(b.type==='bullet'){
      html+=`
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;padding-left:4px;">
        <div style="width:6px;height:6px;border-radius:50%;background:${t.p};flex-shrink:0;margin-top:5px;"></div>
        <p style="font-family:'DM Sans',sans-serif;font-size:0.82rem;line-height:1.7;color:#444;">${b.text}</p>
      </div>`;
    } else if(b.type==='quote'){
      html+=`
      <div style="border-left:3px solid ${t.p};background:${t.l};padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0;">
        <p style="font-family:'Lora',serif;font-style:italic;font-size:0.82rem;color:${t.t};line-height:1.7;">${b.text}</p>
      </div>`;
    } else if(b.type==='callout'){
      html+=`
      <div style="background:${t.l};border:1px solid ${t.a};border-radius:8px;padding:12px 16px;margin:12px 0;display:flex;gap:10px;align-items:flex-start;">
        <span style="font-size:0.9rem;">💡</span>
        <p style="font-family:'DM Sans',sans-serif;font-size:0.8rem;color:${t.t};line-height:1.65;font-weight:500;">${b.text}</p>
      </div>`;
    } else if(b.type==='text'){
      html+=`<p style="font-family:'DM Sans',sans-serif;font-size:0.82rem;line-height:1.8;color:#444;margin-bottom:8px;">${b.text}</p>`;
    }
  });

  return `
  <div class="page-preview">
    <div style="background:${t.p};height:4px;"></div>
    <!-- Page header -->
    <div style="padding:10px 44px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:0.6rem;font-weight:700;color:${t.p};letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Sans',sans-serif;">${title.substring(0,30)}${title.length>30?'...':''}</span>
      <div style="width:16px;height:1px;background:${t.a};"></div>
    </div>
    <!-- Content -->
    <div style="padding:24px 44px 16px;">${html}</div>
    <!-- Footer -->
    <div style="padding:10px 44px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;">
      <div style="width:16px;height:1px;background:${t.a};"></div>
      <span style="font-size:0.65rem;color:#aaa;font-family:'DM Sans',sans-serif;">1</span>
    </div>
  </div>`;
}

function renderBackCover(title, author, tagline, t){
  return `
  <div class="page-preview" style="aspect-ratio:1/1.414;">
    <div style="background:linear-gradient(160deg,${t.d} 0%,${t.p} 100%);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;text-align:center;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05);"></div>
      <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:32px 28px;max-width:320px;">
        <div style="font-family:'DM Sans',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:16px;">About This Book</div>
        <p style="font-family:'Lora',serif;font-style:italic;font-size:0.9rem;color:white;line-height:1.7;margin-bottom:20px;">"${tagline||'A practical guide to achieving your goals'}"</p>
        <div style="height:1px;background:rgba(255,255,255,0.2);margin-bottom:20px;"></div>
        <div style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:rgba(255,255,255,0.8);">By <strong>${author}</strong></div>
      </div>
      <div style="position:absolute;bottom:24px;font-family:'DM Sans',sans-serif;font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:1px;">© ${new Date().getFullYear()} ${author} · All Rights Reserved</div>
    </div>
  </div>`;
}

// PDF DOWNLOAD
function downloadPDF(){
  const {jsPDF} = window.jspdf;
  const title = document.getElementById('title').value||'My Ebook';
  const author = document.getElementById('author').value||'Author';
  const tagline = document.getElementById('tagline').value||'';
  const content = document.getElementById('content').value;
  const t = getT();

  if(!content.trim()){alert('Please paste your ebook content first!');return;}

  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 20;
  const maxW = W - M*2;

  // Parse colors
  const pc = hexToRgb(t.p), dc = hexToRgb(t.d), lc = hexToRgb(t.l), tc = hexToRgb(t.t), ac = hexToRgb(t.a);

  // ── COVER PAGE ─────────────────────────────────
  doc.setFillColor(pc.r,pc.g,pc.b);
  doc.rect(0,0,W,H*0.6,'F');
  doc.setFillColor(dc.r,dc.g,dc.b);
  doc.rect(0,H*0.6,W,H*0.4,'F');

  // Decorative circles
  doc.setFillColor(255,255,255);
  doc.setGState(doc.GState({opacity:0.05}));
  doc.circle(W-15,15,35,'F');
  doc.circle(15,H-15,25,'F');
  doc.setGState(doc.GState({opacity:1}));

  // EBOOK label
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(255,255,255);
  doc.setCharSpace(4);
  doc.text('E B O O K',W/2,H*0.25,{align:'center'});
  doc.setCharSpace(0);

  // Top line
  doc.setDrawColor(255,255,255);
  doc.setGState(doc.GState({opacity:0.4}));
  doc.setLineWidth(0.5);
  doc.line(W/2-15,H*0.28,W/2+15,H*0.28);
  doc.setGState(doc.GState({opacity:1}));

  // Title
  doc.setFont('helvetica','bold');
  doc.setFontSize(22);
  doc.setTextColor(255,255,255);
  const tls = doc.splitTextToSize(title, maxW);
  let ty = H*0.36;
  tls.forEach(l=>{doc.text(l,W/2,ty,{align:'center'});ty+=10;});

  // Bottom line
  doc.setDrawColor(255,255,255);
  doc.setGState(doc.GState({opacity:0.4}));
  doc.line(W/2-15,ty+4,W/2+15,ty+4);
  doc.setGState(doc.GState({opacity:1}));

  // Tagline
  if(tagline){
    doc.setFont('helvetica','italic');
    doc.setFontSize(10);
    doc.setTextColor(220,220,220);
    const tgls = doc.splitTextToSize(tagline, maxW);
    ty+=12;
    tgls.forEach(l=>{doc.text(l,W/2,ty,{align:'center'});ty+=6;});
  }

  // Author
  ty+=10;
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(255,255,255);
  doc.text('By '+author,W/2,ty,{align:'center'});

  // ── TABLE OF CONTENTS ──────────────────────────
  doc.addPage();
  const blocks = parseContentForPDF(content);
  const chapters = blocks.filter(b=>b.type==='chapter');

  // Header bar
  doc.setFillColor(pc.r,pc.g,pc.b);
  doc.rect(0,0,W,8,'F');

  // TOC Title
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setTextColor(pc.r,pc.g,pc.b);
  doc.setCharSpace(2);
  doc.text('CONTENTS',M,22);
  doc.setCharSpace(0);
  doc.setFontSize(18);
  doc.setTextColor(20,20,20);
  doc.text('Table of Contents',M,32);

  // Line
  doc.setDrawColor(ac.r,ac.g,ac.b);
  doc.setLineWidth(0.5);
  doc.line(M,36,W-M,36);

  let tcy = 48;
  chapters.slice(0,10).forEach((ch,i)=>{
    // Number box
    doc.setFillColor(lc.r,lc.g,lc.b);
    doc.roundedRect(M,tcy-5,8,8,1,1,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor(pc.r,pc.g,pc.b);
    doc.text(String(i+1),M+4,tcy+0.5,{align:'center'});

    // Chapter name
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(40,40,40);
    const cname = doc.splitTextToSize(ch.text, maxW-20);
    doc.text(cname[0]||ch.text,M+12,tcy);

    // Dots & page number
    doc.setTextColor(180,180,180);
    doc.setFontSize(9);
    doc.text(String((i+1)*3+2),W-M,tcy,{align:'right'});

    // Dashed line
    doc.setDrawColor(220,220,220);
    doc.setLineDashPattern([1,1],0);
    doc.line(M+12+doc.getTextWidth((cname[0]||ch.text))+3,tcy-1,W-M-8,tcy-1);
    doc.setLineDashPattern([],0);

    tcy+=12;
  });

  // Footer
  doc.setFillColor(lc.r,lc.g,lc.b);
  doc.rect(0,H-12,W,12,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(tc.r,tc.g,tc.b);
  doc.text('TABLE OF CONTENTS',M,H-5);

  // ── CONTENT PAGES ──────────────────────────────
  doc.addPage();
  let cy = M;
  let pageNum = 1;

  const addHeader = ()=>{
    doc.setFillColor(pc.r,pc.g,pc.b);
    doc.rect(0,0,W,5,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(6);
    doc.setTextColor(pc.r,pc.g,pc.b);
    doc.setCharSpace(1);
    doc.text(title.substring(0,40).toUpperCase(),M,13);
    doc.setCharSpace(0);
    doc.setDrawColor(ac.r,ac.g,ac.b);
    doc.setLineWidth(0.3);
    doc.line(M,15,W-M,15);
    cy = 22;
  };

  const addFooter = ()=>{
    doc.setFillColor(lc.r,lc.g,lc.b);
    doc.rect(0,H-10,W,10,'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor(150,150,150);
    doc.text(String(pageNum),W/2,H-4,{align:'center'});
    doc.setTextColor(tc.r,tc.g,tc.b);
    doc.setFontSize(6);
    doc.setCharSpace(0.5);
    doc.text(author.toUpperCase(),M,H-4);
    doc.setCharSpace(0);
    pageNum++;
  };

  const newPage = ()=>{
    addFooter();
    doc.addPage();
    addHeader();
  };

  const checkY = (h)=>{ if(cy+h > H-16) newPage(); };

  addHeader();

  blocks.forEach(b=>{
    if(!b||!b.type) return;

    if(b.type==='space'){cy+=3;return;}

    if(b.type==='chapter'){
      checkY(22);
      // Chapter box
      doc.setFillColor(lc.r,lc.g,lc.b);
      doc.roundedRect(M,cy-4,maxW,14,2,2,'F');
      doc.setFillColor(pc.r,pc.g,pc.b);
      doc.roundedRect(M,cy-4,4,14,1,1,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(12);
      doc.setTextColor(tc.r,tc.g,tc.b);
      const clines = doc.splitTextToSize(b.text, maxW-12);
      clines.forEach(cl=>{
        checkY(8);
        doc.text(cl,M+8,cy+3);
        cy+=7;
      });
      cy+=8;
      doc.setTextColor(40,40,40);
    }

    else if(b.type==='subheading'){
      checkY(12);
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(pc.r,pc.g,pc.b);
      doc.text(b.text.toUpperCase(),M,cy);
      cy+=6;
      doc.setDrawColor(ac.r,ac.g,ac.b);
      doc.setLineWidth(0.3);
      doc.line(M,cy,M+30,cy);
      cy+=5;
      doc.setTextColor(40,40,40);
    }

    else if(b.type==='bullet'){
      checkY(8);
      doc.setFillColor(pc.r,pc.g,pc.b);
      doc.circle(M+2,cy-1.5,1.2,'F');
      doc.setFont('helvetica','normal');
      doc.setFontSize(9.5);
      doc.setTextColor(60,60,60);
      const bls = doc.splitTextToSize(b.text, maxW-8);
      bls.forEach(bl=>{
        checkY(7);
        doc.text(bl,M+6,cy);
        cy+=5.5;
      });
      cy+=1.5;
    }

    else if(b.type==='quote'){
      checkY(16);
      doc.setFillColor(lc.r,lc.g,lc.b);
      doc.roundedRect(M,cy-4,maxW,14,2,2,'FD');
      doc.setDrawColor(pc.r,pc.g,pc.b);
      doc.setLineWidth(2);
      doc.line(M,cy-4,M,cy+10);
      doc.setLineWidth(0.3);
      doc.setFont('helvetica','italic');
      doc.setFontSize(9.5);
      doc.setTextColor(tc.r,tc.g,tc.b);
      const qls = doc.splitTextToSize(b.text, maxW-10);
      qls.forEach(ql=>{
        checkY(7);
        doc.text(ql,M+6,cy);
        cy+=6;
      });
      cy+=6;
      doc.setTextColor(40,40,40);
    }

    else if(b.type==='callout'){
      checkY(18);
      doc.setFillColor(lc.r,lc.g,lc.b);
      doc.roundedRect(M,cy-4,maxW,16,3,3,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(tc.r,tc.g,tc.b);
      doc.text('💡 '+b.text.replace(/^(Note:|Tip:|Important:|Remember:)/i,'').trim(),M+6,cy+2);
      cy+=16;
    }

    else if(b.type==='text'){
      checkY(7);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9.5);
      doc.setTextColor(65,65,65);
      const pls = doc.splitTextToSize(b.text, maxW);
      pls.forEach(pl=>{
        checkY(6.5);
        doc.text(pl,M,cy);
        cy+=6;
      });
      cy+=2;
    }
  });

  addFooter();

  // ── BACK COVER ─────────────────────────────────
  doc.addPage();
  doc.setFillColor(dc.r,dc.g,dc.b);
  doc.rect(0,0,W,H,'F');
  doc.setFillColor(pc.r,pc.g,pc.b);
  doc.rect(0,0,W,H*0.4,'F');

  // Decorative
  doc.setFillColor(255,255,255);
  doc.setGState(doc.GState({opacity:0.05}));
  doc.circle(W-20,20,30,'F');
  doc.setGState(doc.GState({opacity:1}));

  // Box
  doc.setFillColor(255,255,255);
  doc.setGState(doc.GState({opacity:0.12}));
  doc.roundedRect(M,H*0.3,maxW,H*0.5,6,6,'F');
  doc.setGState(doc.GState({opacity:1}));

  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setTextColor(255,255,255);
  doc.setCharSpace(3);
  doc.text('ABOUT THIS BOOK',W/2,H*0.38,{align:'center'});
  doc.setCharSpace(0);

  if(tagline){
    doc.setFont('helvetica','italic');
    doc.setFontSize(11);
    doc.setTextColor(240,240,240);
    const tglines = doc.splitTextToSize('"'+tagline+'"',maxW-20);
    let bty = H*0.46;
    tglines.forEach(l=>{doc.text(l,W/2,bty,{align:'center'});bty+=7;});
  }

  // Divider
  doc.setDrawColor(255,255,255);
  doc.setGState(doc.GState({opacity:0.3}));
  doc.line(W/2-20,H*0.65,W/2+20,H*0.65);
  doc.setGState(doc.GState({opacity:1}));

  // Author
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(255,255,255);
  doc.text('By '+author,W/2,H*0.7,{align:'center'});

  // Copyright
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(180,180,180);
  doc.text('© '+new Date().getFullYear()+' '+author+' · All Rights Reserved',W/2,H-10,{align:'center'});

  doc.save(title.replace(/[^a-z0-9]/gi,'_')+'_designed.pdf');
}

// HELPERS
function parseContentForPDF(raw){
  return raw.split('\n').map(line=>{
    const l = line.trim();
    if(!l) return {type:'space'};
    if(l.match(/^#{1,2}\s/)||l.match(/^(Chapter|Introduction|Conclusion|Preface)/i)) return {type:'chapter',text:l.replace(/^#+\s*/,'')};
    if(l.match(/^###\s/)) return {type:'subheading',text:l.replace(/^#+\s*/,'')};
    if(l.startsWith('-')||l.match(/^\d+\.\s/)||l.startsWith('•')) return {type:'bullet',text:l.replace(/^[-•\d.]+\s*/,'')};
    if(l.startsWith('>')||l.startsWith('"')) return {type:'quote',text:l.replace(/^[>"]\s*/,'')};
    if(l.match(/^(Note:|Tip:|Important:|Remember:)/i)) return {type:'callout',text:l};
    return {type:'text',text:l};
  });
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
